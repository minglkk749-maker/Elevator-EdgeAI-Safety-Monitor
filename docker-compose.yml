services:
  # AI 推論服務
  ai-guard:
    build: .
    container_name: elevator-ai-container
    restart: always  # <--- 加入此行：確保系統重啟後自動恢復推論任務
    volumes:
      - .:/app
    working_dir: /app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    depends_on:
      - mosquitto
    command: python3 elevator_ai_guard_v2.py

  # 本地 Mosquitto MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: local-mqtt-broker
    restart: always  # <--- 加入此行：確保通訊骨幹始終在線
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf